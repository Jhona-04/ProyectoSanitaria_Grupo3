<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/style.css">
        <link rel="stylesheet" href="../css/login.css">
        <link rel="shortcut icon" href="../assets/images/mascarilla.ico" type="image/x-icon">
</head>
<body>
    <div id="reset-password-form" class="reset-form">
    <h1 class="log__title">Nueva Contraseña</h1>
    <form class="form" id="form-reset" novalidate>

        <article class="form__group">
            <div class="form__input-wrap">
                <input class="form__input" type="password" id="new-password" name="new-password"
                    placeholder="Nueva Contraseña" required minlength="8" maxlength="16"
                    pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[!@#$%^&*]).{8,16}">
                <span class="form__input-icon" id="toggle-new-pwd">
                    <i class="fa-regular fa-eye"></i>
                </span>
            </div>
            <p class="form__error-message" aria-live="polite"></p>
            <div class="form__strength">
                <span class="form__strength-bar" id="rs1"></span>
                <span class="form__strength-bar" id="rs2"></span>
                <span class="form__strength-bar" id="rs3"></span>
                <span class="form__strength-bar" id="rs4"></span>
            </div>
            <p class="form__hint">8-16 caracteres, mayúsculas, minúsculas y símbolos</p>
        </article>

        <article class="form__group">
            <div class="form__input-wrap">
                <input class="form__input" type="password" id="confirm-password" name="confirm-password"
                    placeholder="Confirmar Contraseña" required>
                <span class="form__input-icon" id="toggle-confirm-pwd">
                    <i class="fa-regular fa-eye"></i>
                </span>
            </div>
            <p class="form__error-message" aria-live="polite"></p>
        </article>


        <p class="form__error-message form__error-message--general" id="general-error-message" aria-live="polite"></p>
        <p class="form__success-message" id="general-success-message" aria-live="polite" style="display:none;"></p>

        <button class="form__button" type="submit" id="btn-reset-submit">Actualizar Contraseña</button>

        <p class="form__text"><a class="form__link" href="../index.html">Cancelar y volver</a></p>
    </form>
</div>
<script src="../js/resetPassword.js"></script>
</body>
</html>
