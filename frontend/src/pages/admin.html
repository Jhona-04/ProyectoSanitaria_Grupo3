<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="admin-panel">
    <header class="admin-panel__header">
        <div class="admin-panel__header-container">
            <h1 class="admin-panel__title">Gestión de Usuarios</h1>
        </div>
    </header>
    
    <main class="admin-panel__content">
        <section class="table-card">
            <header class="table-card__header">
                <h2 class="table-card__title">Lista de Usuarios</h2>
            </header>
            
            <table class="user-table">
                <thead class="user-table__head">
                    <tr class="user-table__row">
                        <th class="user-table__header-cell">Nombre</th>
                        <th class="user-table__header-cell">Apellidos</th>
                        <th class="user-table__header-cell">Email</th>
                        <th class="user-table__header-cell">Rol</th>
                        <th class="user-table__header-cell">Centro</th>
                        <th class="user-table__header-cell user-table__header-cell--actions">Acciones</th>
                    </tr>
                </thead>
                <tbody class="user-table__body" id="user-table">
                    <!-- Único ejemplo de usuario -->
                    <!-- <tr class="user-table__row">
                        <td class="user-table__cell">Laura</td>
                        <td class="user-table__cell">Martínez Gómez</td>
                        <td class="user-table__cell">l.martinez@ejemplo.com</td>
                        <td class="user-table__cell">Especialista</td>
                        <td class="user-table__cell">Hospital Clínico</td>
                        <td class="user-table__cell user-table__cell--actions">
                            <button class="button button--edit">Editar</button>
                            <button class="button button--delete">Eliminar</button>
                        </td>
                    </tr> -->
                </tbody>
            </table>
        </section>
    </main>

    <script src="../js/admin.js"></script>
</body>
</html>
